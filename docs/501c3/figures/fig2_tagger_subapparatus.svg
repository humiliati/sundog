<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 612 792" width="612" height="792"
     font-family="Helvetica, Arial, sans-serif" fill="none" stroke="#000">

  <rect x="0" y="0" width="612" height="792" fill="#ffffff" stroke="none"/>

  <text x="306" y="48" font-size="16" font-weight="bold" text-anchor="middle" fill="#000" stroke="none">FIG. 2</text>
  <text x="306" y="68" font-size="11" text-anchor="middle" fill="#000" stroke="none">TAGGER SUB-APPARATUS  (expansion of element 108)</text>
  <text x="306" y="84" font-size="10" font-style="italic" text-anchor="middle" fill="#000" stroke="none">Claim Candidate A — invariant per-claim four-surface schema</text>

  <defs>
    <marker id="arr2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#000" stroke="none"/>
    </marker>
  </defs>

  <!-- Outer dashed border representing the Tagger as a whole (108) -->
  <rect x="60" y="110" width="492" height="600" stroke="#000" stroke-width="1.2" stroke-dasharray="6,4" fill="none"/>
  <text x="70" y="128" font-size="11" font-weight="bold" fill="#000" stroke="none">108  TAGGER</text>

  <!-- Input from Proxy (104) - dashed phantom box at top -->
  <rect x="206" y="140" width="200" height="34" stroke="#666" stroke-width="1.0" stroke-dasharray="3,3" fill="#fff"/>
  <text x="306" y="161" font-size="10" font-style="italic" text-anchor="middle" fill="#000" stroke="none">(from Evaluator-Side Proxy, 104)</text>

  <!-- arrow into Claim Segmenter, labeled 208 capture_record -->
  <line x1="306" y1="174" x2="306" y2="206" stroke="#000" stroke-width="1.4" marker-end="url(#arr2)"/>
  <text x="314" y="194" font-size="10" fill="#000" stroke="none">208  capture_record  (E4)</text>

  <!-- 108a Claim Segmenter -->
  <rect x="156" y="210" width="300" height="52" stroke="#000" stroke-width="1.4" fill="#fff"/>
  <text x="306" y="232" font-size="12" font-weight="bold" text-anchor="middle" fill="#000" stroke="none">CLAIM SEGMENTER</text>
  <text x="306" y="250" font-size="10" text-anchor="middle" fill="#000" stroke="none">decomposes verbatim response into substantive claims</text>
  <text x="463" y="220" font-size="11" font-weight="bold" fill="#000" stroke="none">108a</text>

  <!-- arrow to fan-out -->
  <line x1="306" y1="262" x2="306" y2="294" stroke="#000" stroke-width="1.4" marker-end="url(#arr2)"/>
  <text x="314" y="282" font-size="9" font-style="italic" fill="#000" stroke="none">per-claim records</text>

  <!-- Fan-out: three parallel classifiers -->
  <!-- horizontal bus line at y=298 -->
  <line x1="120" y1="298" x2="492" y2="298" stroke="#000" stroke-width="1.4"/>
  <!-- vertical down-arrows -->
  <line x1="135" y1="298" x2="135" y2="330" stroke="#000" stroke-width="1.4" marker-end="url(#arr2)"/>
  <line x1="306" y1="298" x2="306" y2="330" stroke="#000" stroke-width="1.4" marker-end="url(#arr2)"/>
  <line x1="477" y1="298" x2="477" y2="330" stroke="#000" stroke-width="1.4" marker-end="url(#arr2)"/>

  <!-- 108b Provenance Classifier -->
  <rect x="65" y="334" width="140" height="80" stroke="#000" stroke-width="1.4" fill="#fff"/>
  <text x="135" y="354" font-size="11" font-weight="bold" text-anchor="middle" fill="#000" stroke="none">PROVENANCE</text>
  <text x="135" y="368" font-size="11" font-weight="bold" text-anchor="middle" fill="#000" stroke="none">CLASSIFIER</text>
  <text x="135" y="385" font-size="9" text-anchor="middle" fill="#000" stroke="none">retrieval / recall /</text>
  <text x="135" y="397" font-size="9" text-anchor="middle" fill="#000" stroke="none">computation /</text>
  <text x="135" y="409" font-size="9" text-anchor="middle" fill="#000" stroke="none">synthesis</text>
  <text x="212" y="344" font-size="11" font-weight="bold" fill="#000" stroke="none">108b</text>

  <!-- 108c Uncertainty Marker Extractor -->
  <rect x="236" y="334" width="140" height="80" stroke="#000" stroke-width="1.4" fill="#fff"/>
  <text x="306" y="354" font-size="11" font-weight="bold" text-anchor="middle" fill="#000" stroke="none">UNCERTAINTY</text>
  <text x="306" y="368" font-size="11" font-weight="bold" text-anchor="middle" fill="#000" stroke="none">MARKER</text>
  <text x="306" y="382" font-size="11" font-weight="bold" text-anchor="middle" fill="#000" stroke="none">EXTRACTOR</text>
  <text x="306" y="400" font-size="9" text-anchor="middle" fill="#000" stroke="none">hedges, qualifiers,</text>
  <text x="306" y="412" font-size="9" text-anchor="middle" fill="#000" stroke="none">calibration claims</text>
  <text x="383" y="344" font-size="11" font-weight="bold" fill="#000" stroke="none">108c</text>

  <!-- 108d Refusal Classifier -->
  <rect x="407" y="334" width="140" height="80" stroke="#000" stroke-width="1.4" fill="#fff"/>
  <text x="477" y="354" font-size="11" font-weight="bold" text-anchor="middle" fill="#000" stroke="none">REFUSAL</text>
  <text x="477" y="368" font-size="11" font-weight="bold" text-anchor="middle" fill="#000" stroke="none">CLASSIFIER</text>
  <text x="477" y="385" font-size="9" text-anchor="middle" fill="#000" stroke="none">scope refusals,</text>
  <text x="477" y="397" font-size="9" text-anchor="middle" fill="#000" stroke="none">boundary markers,</text>
  <text x="477" y="409" font-size="9" text-anchor="middle" fill="#000" stroke="none">escalation cues</text>
  <text x="554" y="344" font-size="11" font-weight="bold" fill="#000" stroke="none">108d</text>

  <!-- merge: three down-arrows into Schema Emitter -->
  <line x1="135" y1="414" x2="135" y2="450" stroke="#000" stroke-width="1.4"/>
  <line x1="306" y1="414" x2="306" y2="450" stroke="#000" stroke-width="1.4"/>
  <line x1="477" y1="414" x2="477" y2="450" stroke="#000" stroke-width="1.4"/>
  <line x1="120" y1="450" x2="492" y2="450" stroke="#000" stroke-width="1.4"/>
  <line x1="306" y1="450" x2="306" y2="482" stroke="#000" stroke-width="1.4" marker-end="url(#arr2)"/>

  <!-- 108e Schema Emitter -->
  <rect x="125" y="486" width="362" height="72" stroke="#000" stroke-width="1.6" fill="#fff"/>
  <text x="306" y="508" font-size="12" font-weight="bold" text-anchor="middle" fill="#000" stroke="none">SCHEMA EMITTER</text>
  <text x="306" y="526" font-size="10" text-anchor="middle" fill="#000" stroke="none">assembles invariant tagged_interaction_record across</text>
  <text x="306" y="540" font-size="10" text-anchor="middle" fill="#000" stroke="none">implementation strategy (rule-based / classifier / hybrid)</text>
  <text x="306" y="554" font-size="9" font-style="italic" text-anchor="middle" fill="#000" stroke="none">— output schema is invariant; tagger_version recorded —</text>
  <text x="494" y="496" font-size="11" font-weight="bold" fill="#000" stroke="none">108e</text>

  <!-- output arrow to Audit Store, labeled 210 -->
  <line x1="306" y1="558" x2="306" y2="608" stroke="#000" stroke-width="1.4" marker-end="url(#arr2)"/>
  <text x="314" y="588" font-size="10" fill="#000" stroke="none">210  tagged_interaction_record  (E5)</text>

  <!-- Output phantom: Audit Store (110) -->
  <rect x="206" y="612" width="200" height="34" stroke="#666" stroke-width="1.0" stroke-dasharray="3,3" fill="#fff"/>
  <text x="306" y="633" font-size="10" font-style="italic" text-anchor="middle" fill="#000" stroke="none">(to Audit Store, 110)</text>

  <!-- Footnote: schema invariance claim -->
  <text x="70" y="675" font-size="9" font-style="italic" fill="#000" stroke="none">Schema invariance: 108a-108d implementations may vary; 108e output structure does not.</text>
  <text x="70" y="690" font-size="9" font-style="italic" fill="#000" stroke="none">Two independently-implemented Taggers produce records that flow into the same downstream Scorer (112).</text>

  <text x="562" y="780" font-size="9" font-style="italic" text-anchor="end" fill="#000" stroke="none">Sheet 2 of 4</text>

</svg>

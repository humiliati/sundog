<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 612 792" width="612" height="792"
     font-family="Helvetica, Arial, sans-serif" fill="none" stroke="#000">

  <rect x="0" y="0" width="612" height="792" fill="#ffffff" stroke="none"/>

  <text x="306" y="48" font-size="16" font-weight="bold" text-anchor="middle" fill="#000" stroke="none">FIG. 3</text>
  <text x="306" y="68" font-size="11" text-anchor="middle" fill="#000" stroke="none">SCORING MODULE — PRINCIPLE-INDEXED REDUCTION  (expansion of 112)</text>
  <text x="306" y="84" font-size="10" font-style="italic" text-anchor="middle" fill="#000" stroke="none">Claim Candidate B — framework-indexed status matrix</text>

  <defs>
    <marker id="arr3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#000" stroke="none"/>
    </marker>
  </defs>

  <!-- Outer dashed border for 112 -->
  <rect x="60" y="110" width="492" height="540" stroke="#000" stroke-width="1.2" stroke-dasharray="6,4" fill="none"/>
  <text x="70" y="128" font-size="11" font-weight="bold" fill="#000" stroke="none">112  SCORING MODULE</text>

  <!-- Input phantom: Audit Store (110) -->
  <ellipse cx="306" cy="155" rx="100" ry="9" stroke="#666" stroke-width="1.0" stroke-dasharray="3,3" fill="#fff"/>
  <line x1="206" y1="155" x2="206" y2="175" stroke="#666" stroke-width="1.0" stroke-dasharray="3,3"/>
  <line x1="406" y1="155" x2="406" y2="175" stroke="#666" stroke-width="1.0" stroke-dasharray="3,3"/>
  <ellipse cx="306" cy="175" rx="100" ry="9" stroke="#666" stroke-width="1.0" stroke-dasharray="3,3" fill="#fff"/>
  <text x="306" y="170" font-size="10" font-style="italic" text-anchor="middle" fill="#000" stroke="none">(Audit Store 110)</text>

  <!-- E6 / 212 arrow into Record Set Selector -->
  <line x1="306" y1="184" x2="306" y2="214" stroke="#000" stroke-width="1.4" marker-end="url(#arr3)"/>
  <text x="314" y="202" font-size="10" fill="#000" stroke="none">212  query by evaluation_run_id  (E6)</text>

  <!-- 112a Record Set Selector -->
  <rect x="125" y="218" width="362" height="48" stroke="#000" stroke-width="1.4" fill="#fff"/>
  <text x="306" y="240" font-size="12" font-weight="bold" text-anchor="middle" fill="#000" stroke="none">RECORD SET SELECTOR</text>
  <text x="306" y="256" font-size="10" text-anchor="middle" fill="#000" stroke="none">filters tagged records by evaluation_run_id</text>
  <text x="494" y="228" font-size="11" font-weight="bold" fill="#000" stroke="none">112a</text>

  <line x1="306" y1="266" x2="306" y2="298" stroke="#000" stroke-width="1.4" marker-end="url(#arr3)"/>

  <!-- 112b Principle Index Mapper -->
  <rect x="125" y="302" width="362" height="60" stroke="#000" stroke-width="1.4" fill="#fff"/>
  <text x="306" y="324" font-size="12" font-weight="bold" text-anchor="middle" fill="#000" stroke="none">PRINCIPLE INDEX MAPPER</text>
  <text x="306" y="340" font-size="10" text-anchor="middle" fill="#000" stroke="none">maps records to publicly defined principle index</text>
  <text x="306" y="354" font-size="10" text-anchor="middle" fill="#000" stroke="none">(Initiative §2.1 / §2.2 / §2.3 / §2.7)</text>
  <text x="494" y="312" font-size="11" font-weight="bold" fill="#000" stroke="none">112b</text>

  <line x1="306" y1="362" x2="306" y2="394" stroke="#000" stroke-width="1.4" marker-end="url(#arr3)"/>

  <!-- 112c Metric Reducer -->
  <rect x="125" y="398" width="362" height="48" stroke="#000" stroke-width="1.4" fill="#fff"/>
  <text x="306" y="420" font-size="12" font-weight="bold" text-anchor="middle" fill="#000" stroke="none">METRIC REDUCER</text>
  <text x="306" y="436" font-size="10" text-anchor="middle" fill="#000" stroke="none">per-principle metrics, per-category breakdown</text>
  <text x="494" y="408" font-size="11" font-weight="bold" fill="#000" stroke="none">112c</text>

  <line x1="306" y1="446" x2="306" y2="478" stroke="#000" stroke-width="1.4" marker-end="url(#arr3)"/>

  <!-- 112d Status Matrix Marker -->
  <rect x="125" y="482" width="362" height="100" stroke="#000" stroke-width="1.6" fill="#fff"/>
  <text x="306" y="504" font-size="12" font-weight="bold" text-anchor="middle" fill="#000" stroke="none">STATUS MATRIX MARKER</text>
  <text x="306" y="520" font-size="10" text-anchor="middle" fill="#000" stroke="none">per-principle marker assigning one of:</text>

  <!-- Three status labels in a row -->
  <rect x="142" y="528" width="100" height="22" stroke="#000" stroke-width="1.2" fill="#fff"/>
  <text x="192" y="544" font-size="10" font-weight="bold" text-anchor="middle" fill="#000" stroke="none">INSTRUMENTED</text>

  <rect x="256" y="528" width="100" height="22" stroke="#000" stroke-width="1.2" fill="#fff"/>
  <text x="306" y="544" font-size="10" font-weight="bold" text-anchor="middle" fill="#000" stroke="none">DEFERRED</text>

  <rect x="370" y="528" width="100" height="22" stroke="#000" stroke-width="1.2" fill="#fff"/>
  <text x="420" y="544" font-size="10" font-weight="bold" text-anchor="middle" fill="#000" stroke="none">PAPER-ONLY</text>

  <text x="306" y="568" font-size="9" font-style="italic" text-anchor="middle" fill="#000" stroke="none">framework-indexed status matrix output makes</text>
  <text x="306" y="580" font-size="9" font-style="italic" text-anchor="middle" fill="#000" stroke="none">two Reports on two different deployments comparable</text>
  <text x="494" y="492" font-size="11" font-weight="bold" fill="#000" stroke="none">112d</text>

  <!-- E7 / 214 arrow out -->
  <line x1="306" y1="582" x2="306" y2="617" stroke="#000" stroke-width="1.4" marker-end="url(#arr3)"/>
  <text x="314" y="603" font-size="10" fill="#000" stroke="none">214  principle_metric_set  (E7)</text>

  <!-- Output phantom: Report Renderer (114) -->
  <rect x="206" y="620" width="200" height="22" stroke="#666" stroke-width="1.0" stroke-dasharray="3,3" fill="#fff"/>
  <text x="306" y="635" font-size="10" font-style="italic" text-anchor="middle" fill="#000" stroke="none">(to Report Renderer, 114)</text>

  <!-- Footnote -->
  <text x="70" y="675" font-size="9" font-style="italic" fill="#000" stroke="none">Distinguishing feature vs. existing LLM-eval frameworks: output is a framework-indexed</text>
  <text x="70" y="690" font-size="9" font-style="italic" fill="#000" stroke="none">status matrix, not a single benchmark score; structurally a different artifact.</text>

  <text x="562" y="780" font-size="9" font-style="italic" text-anchor="end" fill="#000" stroke="none">Sheet 3 of 4</text>

</svg>

name = "sundog"
compatibility_date = "2024-09-25"
pages_build_output_dir = "dist"

# --- Resource bindings for /api/sundog/* Phase 5B endpoints ----------------
#
# Binding names are referenced as env.<binding> inside the Functions code.
# They are deliberately lowercase to match the names already provisioned in
# the Cloudflare dashboard.

[[r2_buckets]]
binding      = "sundog_uploads"
bucket_name  = "sundog-uploads"

[[kv_namespaces]]
binding      = "sundog_rate_limit"
id           = "672e2916dad9475392cc794afb72f214"

[vars]
POLICY_VERSION             = "2026-05-12"
MAX_IMAGE_BYTES            = "10485760"
RATE_LIMIT_PER_IP_PER_HOUR = "5"
PUBLIC_ORIGIN              = "https://sundog.cc"

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.72"/>
      <stop offset="100%" stop-color="#FFFAF0" stop-opacity="0.94"/>
    </linearGradient>
    <pattern id="ruled" x="0" y="0" width="1200" height="28" patternUnits="userSpaceOnUse">
      <line x1="0" y1="27" x2="1200" y2="27" stroke="#63A3DC" stroke-opacity="0.075" stroke-width="1"/>
    </pattern>
    <radialGradient id="halo" cx="0.18" cy="0.12" r="0.6">
      <stop offset="0%" stop-color="#F4C430" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#F4C430" stop-opacity="0"/>
    </radialGradient>
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="125%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="4"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.15"/></feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Base paper layer: warm cream -->
  <rect width="1200" height="630" fill="#FEFDFB"/>
  <!-- Paper-white-to-warm vertical gradient overlay -->
  <rect width="1200" height="630" fill="url(#paper)"/>
  <!-- Horizontal ruled lines -->
  <rect width="1200" height="630" fill="url(#ruled)"/>
  <!-- Red vertical margin (about 90px from left, like a legal pad) -->
  <rect x="90" y="0" width="2" height="630" fill="#FF6363" fill-opacity="0.12"/>
  <!-- Top-left warm halo wash for depth -->
  <rect width="1200" height="630" fill="url(#halo)"/>

  <!-- Top accent rule (brass) -->
  <rect x="60" y="60" width="80" height="3" fill="#C99517"/>

  <!-- Eyebrow -->
  <text x="60" y="100" font-family="Verdana, Geneva, sans-serif" font-size="20" font-weight="700" fill="#2A5570" letter-spacing="3">SUNDOG · PRESSURE MINES</text>

  <!-- Headline -->
  <text x="60" y="200" font-family="Georgia, 'Times New Roman', serif" font-size="56" font-weight="700" fill="#1A3A52">Pressure maps</text>
  <text x="60" y="259" font-family="Georgia, 'Times New Roman', serif" font-size="56" font-weight="700" fill="#1A3A52">become decisions.</text>

  <!-- Lede -->
  <text x="60" y="366" font-family="Verdana, Geneva, sans-serif" font-size="22" font-weight="400" fill="#40505C">A noisy pressure field buys safe</text>
  <text x="60" y="398" font-family="Verdana, Geneva, sans-serif" font-size="22" font-weight="400" fill="#40505C">progress inside a narrow mapped</text>
  <text x="60" y="430" font-family="Verdana, Geneva, sans-serif" font-size="22" font-weight="400" fill="#40505C">pocket — and fails cleanly past it.</text>

  <!-- URL -->
  <text x="60" y="560" font-family="Courier New, Courier, monospace" font-size="22" font-weight="700" fill="#1A3A52">sundog.cc/mines</text>

  <!-- Per-page visualization (right side) -->
  
  <g transform="translate(700,160)">
    <text x="180" y="-15" font-family="Verdana, Geneva, sans-serif" font-size="13" font-weight="700" letter-spacing="2" fill="#6A7680" text-anchor="middle">PRESSURE FIELD · SAFE POCKET</text>
    <!-- 6x6 grid, cell 50x50, gap 4 -->
    <!-- Pressure shading: increases toward bottom-right -->
    <rect x="0" y="0" width="50" height="50" rx="3" fill="#F4C430" fill-opacity="0.05" stroke="#C99517" stroke-opacity="0.20" stroke-width="1.4"/>    <rect x="54" y="0" width="50" height="50" rx="3" fill="#F4C430" fill-opacity="0.10" stroke="#C99517" stroke-opacity="0.26" stroke-width="1.4"/>    <rect x="108" y="0" width="50" height="50" rx="3" fill="#F4C430" fill-opacity="0.15" stroke="#C99517" stroke-opacity="0.32" stroke-width="1.4"/>    <rect x="162" y="0" width="50" height="50" rx="3" fill="#F4C430" fill-opacity="0.20" stroke="#C99517" stroke-opacity="0.38" stroke-width="1.4"/>    <rect x="216" y="0" width="50" height="50" rx="3" fill="#F4C430" fill-opacity="0.25" stroke="#C99517" stroke-opacity="0.44" stroke-width="1.4"/>    <rect x="270" y="0" width="50" height="50" rx="3" fill="#F4C430" fill-opacity="0.30" stroke="#C99517" stroke-opacity="0.50" stroke-width="1.4"/>    <rect x="0" y="54" width="50" height="50" rx="3" fill="#F4C430" fill-opacity="0.10" stroke="#C99517" stroke-opacity="0.26" stroke-width="1.4"/>    <rect x="54" y="54" width="50" height="50" rx="3" fill="#F4C430" fill-opacity="0.15" stroke="#C99517" stroke-opacity="0.32" stroke-width="1.4"/>    <rect x="108" y="54" width="50" height="50" rx="3" fill="#F4C430" fill-opacity="0.20" stroke="#C99517" stroke-opacity="0.38" stroke-width="1.4"/>    <rect x="162" y="54" width="50" height="50" rx="3" fill="#F4C430" fill-opacity="0.25" stroke="#C99517" stroke-opacity="0.44" stroke-width="1.4"/>    <rect x="216" y="54" width="50" height="50" rx="3" fill="#F4C430" fill-opacity="0.30" stroke="#C99517" stroke-opacity="0.50" stroke-width="1.4"/>    <rect x="270" y="54" width="50" height="50" rx="3" fill="#F4C430" fill-opacity="0.35" stroke="#C99517" stroke-opacity="0.56" stroke-width="1.4"/>    <rect x="0" y="108" width="50" height="50" rx="3" fill="#F4C430" fill-opacity="0.15" stroke="#C99517" stroke-opacity="0.32" stroke-width="1.4"/>    <rect x="54" y="108" width="50" height="50" rx="3" fill="#F4C430" fill-o
oke-width="1.4"/>    <rect x="162" y="216" width="50" height="50" rx="3" fill="#F4C430" fill-opacity="0.40" stroke="#C99517" stroke-opacity="0.62" stroke-width="1.4"/>    <rect x="216" y="216" width="50" height="50" rx="3" fill="#F4C430" fill-opacity="0.45" stroke="#C99517" stroke-opacity="0.68" stroke-width="1.4"/>    <rect x="270" y="216" width="50" height="50" rx="3" fill="#F4C430" fill-opacity="0.50" stroke="#C99517" stroke-opacity="0.74" stroke-width="1.4"/>    <rect x="0" y="270" width="50" height="50" rx="3" fill="#F4C430" fill-opacity="0.30" stroke="#C99517" stroke-opacity="0.50" stroke-width="1.4"/>    <rect x="54" y="270" width="50" height="50" rx="3" fill="#F4C430" fill-opacity="0.35" stroke="#C99517" stroke-opacity="0.56" stroke-width="1.4"/>    <rect x="108" y="270" width="50" height="50" rx="3" fill="#F4C430" fill-opacity="0.40" stroke="#C99517" stroke-opacity="0.62" stroke-width="1.4"/>    <rect x="162" y="270" width="50" height="50" rx="3" fill="#F4C430" fill-opacity="0.45" stroke="#C99517" stroke-opacity="0.68" stroke-width="1.4"/>    <rect x="216" y="270" width="50" height="50" rx="3" fill="#F4C430" fill-opacity="0.50" stroke="#C99517" stroke-opacity="0.74" stroke-width="1.4"/>    <rect x="270" y="270" width="50" height="50" rx="3" fill="#F4C430" fill-opacity="0.55" stroke="#C99517" stroke-opacity="0.80" stroke-width="1.4"/>
    <!-- revealed mine marker bottom-right -->
    <circle cx="297" cy="297" r="14" fill="#D45A4A" stroke="#9C2D21" stroke-width="2"/>
    <line x1="288" y1="288" x2="306" y2="306" stroke="#FFFFFF" stroke-width="2"/>
    <line x1="306" y1="288" x2="288" y2="306" stroke="#FFFFFF" stroke-width="2"/>
    <!-- safe pocket annotation top-left -->
    <circle cx="25"  cy="25"  r="5" fill="#2E7D5A"/>
    <text x="38" y="29" font-family="Verdana, Geneva, sans-serif" font-size="12" fill="#2E7D5A">safe</text>
  </g>


  <!-- Bottom-right mark -->
  <text x="1140" y="600" font-family="Verdana, Geneva, sans-serif" font-size="14" font-weight="700" letter-spacing="2" fill="#9AA4AC" text-anchor="end">sundog.cc</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FDFDFC"/>
      <stop offset="100%" stop-color="#F5F4EE"/>
    </linearGradient>
    <radialGradient id="halo" cx="0.18" cy="0.12" r="0.6">
      <stop offset="0%" stop-color="#F4C430" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#F4C430" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#halo)"/>

  <!-- Top accent rule -->
  <rect x="60" y="60" width="80" height="3" fill="#C99517"/>

  <!-- Eyebrow -->
  <text x="60" y="100" font-family="Verdana, Geneva, sans-serif" font-size="20" font-weight="700" fill="#2A5570" letter-spacing="3">SUNDOG · FARADAY RECEIPT</text>

  <!-- Headline -->
  <text x="60" y="200" font-family="Georgia, 'Times New Roman', serif" font-size="56" font-weight="700" fill="#1A3A52">Local shadows</text>
  <text x="60" y="259" font-family="Georgia, 'Times New Roman', serif" font-size="56" font-weight="700" fill="#1A3A52">close the loop.</text>

  <!-- Lede -->
  <text x="60" y="366" font-family="Verdana, Geneva, sans-serif" font-size="22" font-weight="400" fill="#40505C">Branch A on the registered</text>
  <text x="60" y="398" font-family="Verdana, Geneva, sans-serif" font-size="22" font-weight="400" fill="#40505C">classical-vacuum domain.</text>
  <text x="60" y="430" font-family="Verdana, Geneva, sans-serif" font-size="22" font-weight="400" fill="#40505C">Five-phase receipt chain closed.</text>

  <!-- URL -->
  <text x="60" y="560" font-family="Courier New, Courier, monospace" font-size="22" font-weight="700" fill="#1A3A52">sundog.cc/faraday</text>

  <!-- Per-page visualization (right side, ~620 to ~1140) -->
  
  <g transform="translate(700,135)">
    <text x="190" y="-15" font-family="Verdana, Geneva, sans-serif" font-size="13" font-weight="700" letter-spacing="2" fill="#6A7680" text-anchor="middle">LOCAL LOOP CLOSURE</text>
    <ellipse cx="150" cy="155" rx="122" ry="82" fill="#2A5570" fill-opacity="0.08" stroke="#2A5570" stroke-width="2" stroke-dasharray="5 5"/>
    <ellipse cx="150" cy="155" rx="145" ry="105" fill="none" stroke="#B53A2C" stroke-width="3"/>
    <polygon points="295,151 282,143 282,159" fill="#B53A2C"/>
    <polygon points="8,159 21,151 21,167" fill="#B53A2C"/>

    <g stroke="#2A5570" stroke-width="2.4" fill="#2A5570">
      <line x1="95" y1="95" x2="95" y2="210"/>
      <polygon points="95,220 88,205 102,205"/>
      <line x1="150" y1="75" x2="150" y2="235"/>
      <polygon points="150,245 143,230 157,230"/>
      <line x1="205" y1="95" x2="205" y2="210"/>
      <polygon points="205,220 198,205 212,205"/>
    </g>

    <text x="150" y="48" font-family="Georgia, serif" font-size="28" font-weight="700" font-style="italic" fill="#2A5570" text-anchor="middle">B(t)</text>
    <text x="320" y="165" font-family="Georgia, serif" font-size="28" font-weight="700" font-style="italic" fill="#B53A2C">E</text>

    <g transform="translate(250,265)">
      <rect x="0" y="0" width="185" height="76" rx="8" fill="#FFFFFF" stroke="#CFD8DC" stroke-width="1.4"/>
      <text x="18" y="28" font-family="Courier New, Courier, monospace" font-size="16" font-weight="700" fill="#2E7D5A">Branch A</text>
      <text x="18" y="52" font-family="Courier New, Courier, monospace" font-size="14" fill="#1A3A52">Phase 4: 5/5</text>
    </g>
  </g>


  <!-- Bottom-right mark -->
  <text x="1140" y="600" font-family="Verdana, Geneva, sans-serif" font-size="14" font-weight="700" letter-spacing="2" fill="#9AA4AC" text-anchor="end">sundog.cc</text>
</svg>

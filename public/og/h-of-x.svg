<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FDFDFC"/>
      <stop offset="100%" stop-color="#F5F4EE"/>
    </linearGradient>
    <radialGradient id="halo" cx="0.18" cy="0.12" r="0.6">
      <stop offset="0%" stop-color="#F4C430" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#F4C430" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#halo)"/>

  <!-- Top accent rule -->
  <rect x="60" y="60" width="80" height="3" fill="#C99517"/>

  <!-- Eyebrow -->
  <text x="60" y="100" font-family="Verdana, Geneva, sans-serif" font-size="20" font-weight="700" fill="#2A5570" letter-spacing="3">SUNDOG · h(x)</text>

  <!-- Headline -->
  <text x="60" y="220" font-family="Georgia, 'Times New Roman', serif" font-size="68" font-weight="700" fill="#1A3A52">The first equation.</text>

  <!-- Lede -->
  <text x="60" y="340" font-family="Verdana, Geneva, sans-serif" font-size="22" font-weight="400" fill="#40505C">Parhelion offset gives sun altitude</text>
  <text x="60" y="372" font-family="Verdana, Geneva, sans-serif" font-size="22" font-weight="400" fill="#40505C">through the promoted inverse —</text>
  <text x="60" y="404" font-family="Verdana, Geneva, sans-serif" font-size="22" font-weight="400" fill="#40505C">with the eligibility boundary visible.</text>

  <!-- URL -->
  <text x="60" y="560" font-family="Courier New, Courier, monospace" font-size="22" font-weight="700" fill="#1A3A52">sundog.cc/h-of-x</text>

  <!-- Per-page visualization (right side, ~620 to ~1140) -->
  
  <g transform="translate(820,180)">
    <text x="160" y="-15" font-family="Verdana, Geneva, sans-serif" font-size="13" font-weight="700" letter-spacing="2" fill="#6A7680" text-anchor="middle">PROMOTED INVERSE</text>
    <rect x="0" y="0" width="320" height="180" rx="8" fill="#FFFFFF" stroke="#CFD8DC" stroke-width="1.5"/>
    <!-- Equation rendered as plain text without baseline-shift tspans -->
    <text x="160" y="75" font-family="Georgia, serif" font-size="36" font-weight="700" fill="#1A3A52" text-anchor="middle" font-style="italic">cos(h) = R₂₂ / α₀</text>
    <!-- Legend -->
    <text x="160" y="115" font-family="Verdana, Geneva, sans-serif" font-size="13" fill="#40505C" text-anchor="middle" font-style="italic">h: sun altitude   ·   α₀: parhelion offset</text>
    <text x="160" y="148" font-family="Verdana, Geneva, sans-serif" font-size="12" fill="#9AA4AC" text-anchor="middle" font-style="italic">eligible on a strict 3-photo subset</text>
  </g>
  <!-- small parhelion sketch underneath -->
  <g transform="translate(980,450)">
    <line x1="-80" y1="0" x2="80" y2="0" stroke="#9AA4AC" stroke-width="1"/>
    <polygon points="0,-14 14,0 0,14 -14,0" fill="#F4C430" stroke="#C99517" stroke-width="1.2"/>
    <polygon points="-58,-6 -50,0 -58,6 -66,0" fill="#F4C430" stroke="#C99517" stroke-width="1"/>
    <polygon points="58,-6 66,0 58,6 50,0" fill="#F4C430" stroke="#C99517" stroke-width="1"/>
    <text x="0" y="-22" font-family="Georgia, serif" font-size="13" fill="#6A7680" text-anchor="middle" font-style="italic">α₀</text>
  </g>


  <!-- Bottom-right mark -->
  <text x="1140" y="600" font-family="Verdana, Geneva, sans-serif" font-size="14" font-weight="700" letter-spacing="2" fill="#9AA4AC" text-anchor="end">sundog.cc</text>
</svg>

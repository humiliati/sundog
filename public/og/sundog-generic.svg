<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FDFDFC"/>
      <stop offset="100%" stop-color="#F5F4EE"/>
    </linearGradient>
    <radialGradient id="halo" cx="0.18" cy="0.12" r="0.6">
      <stop offset="0%" stop-color="#F4C430" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#F4C430" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#halo)"/>

  <!-- Top accent rule -->
  <rect x="60" y="60" width="80" height="3" fill="#C99517"/>

  <!-- Eyebrow -->
  <text x="60" y="100" font-family="Verdana, Geneva, sans-serif" font-size="20" font-weight="700" fill="#2A5570" letter-spacing="3">SUNDOG RESEARCH LAB</text>

  <!-- Headline -->
  <text x="60" y="200" font-family="Georgia, 'Times New Roman', serif" font-size="56" font-weight="700" fill="#1A3A52">Indirect signals,</text>
  <text x="60" y="259" font-family="Georgia, 'Times New Roman', serif" font-size="56" font-weight="700" fill="#1A3A52">made useful.</text>

  <!-- Lede -->
  <text x="60" y="366" font-family="Verdana, Geneva, sans-serif" font-size="22" font-weight="400" fill="#40505C">Halo geometry from the math,</text>
  <text x="60" y="398" font-family="Verdana, Geneva, sans-serif" font-size="22" font-weight="400" fill="#40505C">and traceability discipline carried</text>
  <text x="60" y="430" font-family="Verdana, Geneva, sans-serif" font-size="22" font-weight="400" fill="#40505C">into control, agents, and workbenches.</text>

  <!-- URL -->
  <text x="60" y="560" font-family="Courier New, Courier, monospace" font-size="22" font-weight="700" fill="#1A3A52">sundog.cc</text>

  <!-- Per-page visualization (right side, ~620 to ~1140) -->
  
  <g transform="translate(880,305)">
    <!-- 22 degree halo -->
    <circle cx="0" cy="0" r="140" fill="none" stroke="#1A3A52" stroke-width="2.2" opacity="0.85"/>
    <!-- 46 degree halo (faint) -->
    <circle cx="0" cy="0" r="210" fill="none" stroke="#1A3A52" stroke-width="1.0" opacity="0.28" stroke-dasharray="5 5"/>
    <!-- parhelic circle -->
    <line x1="-240" y1="0" x2="240" y2="0" stroke="#2A5570" stroke-width="1.3" opacity="0.55"/>
    <!-- sun pillar -->
    <line x1="0" y1="-240" x2="0" y2="240" stroke="#C99517" stroke-width="1.3" opacity="0.38" stroke-dasharray="4 4"/>
    <!-- Sun -->
    <polygon points="0,-20 20,0 0,20 -20,0" fill="#F4C430" stroke="#C99517" stroke-width="2"/>
    <!-- Parhelia -->
    <polygon points="-140,-9 -122,0 -140,9 -158,0" fill="#F4C430" stroke="#C99517" stroke-width="1.5"/>
    <polygon points="140,-9 158,0 140,9 122,0" fill="#F4C430" stroke="#C99517" stroke-width="1.5"/>
    <!-- CZA -->
    <path d="M -120,-190 Q 0,-245 120,-190" fill="none" stroke="#C99517" stroke-width="2.2" opacity="0.85"/>
  </g>


  <!-- Bottom-right mark -->
  <text x="1140" y="600" font-family="Verdana, Geneva, sans-serif" font-size="14" font-weight="700" letter-spacing="2" fill="#9AA4AC" text-anchor="end">sundog.cc</text>
</svg>

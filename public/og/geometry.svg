<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.72"/>
      <stop offset="100%" stop-color="#FFFAF0" stop-opacity="0.94"/>
    </linearGradient>
    <pattern id="ruled" x="0" y="0" width="1200" height="28" patternUnits="userSpaceOnUse">
      <line x1="0" y1="27" x2="1200" y2="27" stroke="#63A3DC" stroke-opacity="0.075" stroke-width="1"/>
    </pattern>
    <radialGradient id="halo" cx="0.18" cy="0.12" r="0.6">
      <stop offset="0%" stop-color="#F4C430" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#F4C430" stop-opacity="0"/>
    </radialGradient>
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="125%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="4"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.15"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="#FEFDFB"/>
  <rect width="1200" height="630" fill="url(#paper)"/>
  <rect width="1200" height="630" fill="url(#ruled)"/>
  <rect x="90" y="0" width="2" height="630" fill="#FF6363" fill-opacity="0.12"/>
  <rect width="1200" height="630" fill="url(#halo)"/>

  <!-- Top accent rule -->
  <rect x="60" y="60" width="80" height="3" fill="#C99517"/>

  <!-- Eyebrow -->
  <text x="60" y="100" font-family="Verdana, Geneva, sans-serif" font-size="20" font-weight="700" fill="#2A5570" letter-spacing="3">SUNDOG · GEOMETRY</text>

  <!-- Headline -->
  <text x="60" y="200" font-family="Georgia, 'Times New Roman', serif" font-size="56" font-weight="700" fill="#1A3A52">Hidden structure</text>
  <text x="60" y="259" font-family="Georgia, 'Times New Roman', serif" font-size="56" font-weight="700" fill="#1A3A52">workbenches.</text>

  <!-- Lede -->
  <text x="60" y="366" font-family="Verdana, Geneva, sans-serif" font-size="22" font-weight="400" fill="#40505C">Cap sets, halo geometry, h(x), and</text>
  <text x="60" y="398" font-family="Verdana, Geneva, sans-serif" font-size="22" font-weight="400" fill="#40505C">bounded apparatus notes for new</text>
  <text x="60" y="430" font-family="Verdana, Geneva, sans-serif" font-size="22" font-weight="400" fill="#40505C">discrete-geometry discoveries.</text>

  <!-- URL -->
  <text x="60" y="560" font-family="Courier New, Courier, monospace" font-size="22" font-weight="700" fill="#1A3A52">sundog.cc/geometry</text>

  <!-- Per-page visualization (right side, ~620 to ~1140) -->
  
  <g transform="translate(720,140)">
    <text x="200" y="-15" font-family="Verdana, Geneva, sans-serif" font-size="13" font-weight="700" letter-spacing="2" fill="#6A7680" text-anchor="middle">WORKBENCH SHELF</text>
    <!-- Tile 1: cap-set mini grid (3x3 only for legibility) -->
    <g transform="translate(0, 10)">
      <rect x="0" y="0" width="120" height="120" rx="6" fill="#FFFFFF" stroke="#CFD8DC" stroke-width="1.2"/>
      <text x="60" y="18" font-family="Verdana, sans-serif" font-size="10" font-weight="700" fill="#6A7680" text-anchor="middle">CAP-SET</text>
      <!-- 3x3 grid -->
      <g transform="translate(20,30)">
        <rect x="0"  y="0"  width="24" height="24" rx="3" fill="#F4C430" stroke="#C99517" stroke-width="1"/>
        <rect x="28" y="0"  width="24" height="24" rx="3" fill="#FFFFFF" stroke="#CFD8DC" stroke-width="0.8"/>
        <rect x="56" y="0"  width="24" height="24" rx="3" fill="#FFFFFF" stroke="#CFD8DC" stroke-width="0.8"/>
        <rect x="0"  y="28" width="24" height="24" rx="3" fill="#F4C430" stroke="#C99517" stroke-width="1"/>
        <rect x="28" y="28" width="24" height="24" rx="3" fill="#FFFFFF" stroke="#CFD8DC" stroke-width="0.8"/>
        <rect x="56" y="28" width="24" height="24" rx="3" fill="#F4C430" stroke="#C99517" stroke-width="1"/>
        <rect x="0"  y="56" width="24" height="24" rx="3" fill="#FFFFFF" stroke="#CFD8DC" stroke-width="0.8"/>
        <rect x="28" y="56" width="24" height="24" rx="3" fill="#FFFFFF" stroke="#CFD8DC" stroke-width="0.8"/>
        <rect x="56" y="56" width="24" height="24" rx="3" fill="#F4C430" stroke="#C99517" stroke-width="1"/>
      </g>
    </g>
    <!-- Tile 2: halo/parhelion -->
    <g transform="translate(140, 10)">
      <rect x="0" y="0" width="120" height="120" rx="6" fill="#FFFFFF" stroke="#CFD8DC" stroke-width="1.2"/>
      <text x="60" y="18" font-family="Verdana, sans-serif" font-size="10" font-weight="700" fill="#6A7680" text-anchor="middle">HALO ATLAS</text>
      <g transform="translate(60,72)">
        <circle cx="0" cy="0" r="32" fill="none" stroke="#1A3A52" stroke-width="1.5"/>
        <line x1="-50" y1="0" x2="50" y2="0" stroke="#2A5570" stroke-width="0.8" opacity="0.6"/>
        <polygon points="0,-6 6,0 0,6 -6,0" fill="#F4C430" stroke="#C99517" stroke-width="1"/>
        <polygon points="-32,-3 -28,0 -32,3 -36,0" fill="#F4C430" stroke="#C99517" stroke-width="0.8"/>
        <polygon points="32,-3 36,0 32,3 28,0" fill="#F4C430" stroke="#C99517" stroke-width="0.8"/>
        <path d="M -25,-40 Q 0,-50 25,-40" fill="none" stroke="#C99517" stroke-width="1.3" opacity="0.85"/>
      </g>
    </g>
    <!-- Tile 3: h(x) equation -->
    <g transform="translate(280, 10)">
      <rect x="0" y="0" width="120" height="120" rx="6" fill="#FFFFFF" stroke="#CFD8DC" stroke-width="1.2"/>
      <text x="60" y="18" font-family="Verdana, sans-serif" font-size="10" font-weight="700" fill="#6A7680" text-anchor="middle">h(x)</text>
      <text x="60" y="62" font-family="Georgia, serif" font-size="16" font-weight="700" fill="#1A3A52" text-anchor="middle" font-style="italic">cos(h) =</text>
      <text x="60" y="84" font-family="Georgia, serif" font-size="16" font-weight="700" fill="#1A3A52" text-anchor="middle" font-style="italic">R₂₂ / α₀</text>
      <text x="60" y="105" font-family="Verdana, sans-serif" font-size="9" fill="#9AA4AC" text-anchor="middle" font-style="italic">promoted inverse</text>
    </g>
  </g>


  <!-- Bottom-right mark -->
  <text x="1140" y="600" font-family="Verdana, Geneva, sans-serif" font-size="14" font-weight="700" letter-spacing="2" fill="#9AA4AC" text-anchor="end">sundog.cc</text>
</svg>

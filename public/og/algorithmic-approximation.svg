  <text x="685" y="270" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="12" font-weight="700" fill="#1A3A52">max-flow / min-cut</text>
  <text x="940" y="270" font-family="Verdana, Geneva, sans-serif" font-size="11" fill="#5A6772">combinatorial</text>

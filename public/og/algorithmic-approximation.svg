  <text x="685" y="326" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="12" font-weight="700" fill="#1A3A52">2-SAT decision</text>
  <text x="940" y="326" font-family="Verdana, Geneva, sans-serif" font-size="11" fill="#5A6772">decision</text>
  <rect x="1075" y="313" width="55" height="18" rx="9" fill="#E8F4EC" stroke="#2E7D5A" stroke-width="1"/>
  <text x="1102" y="325" font-family="Verdana, Geneva, sans-serif" font-size="10" font-weight="800" fill="#2E7D5A" text-anchor="middle">cheap</text>
  <text x="685" y="354" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="12" font-weight="700" fill="#1A3A52">Pratt primality</text>
  <text x="940" y="354" font-family="Verdana, Geneva, sans-serif" font-size="11" fill="#5A6772">number theory</text>
  <rect x="1075" y="341" width="55" height="18" rx="9" fill="#E8F4EC" stroke="#2E7D5A" stroke-width="1"/>

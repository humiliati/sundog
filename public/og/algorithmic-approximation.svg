  <text x="940" y="410" font-family="Verdana, Geneva, sans-serif" font-size="11" fill="#5A6772">finite-field</text>
  <rect x="1075" y="397" width="55" height="18" rx="9" fill="#E8F4EC" stroke="#2E7D5A" stroke-width="1"/>
  <text x="1102" y="409" font-family="Verdana, Geneva, sans-serif" font-size="10" font-weight="800" fill="#2E7D5A" text-anchor="middle">cheap</text>
  <text x="685" y="438" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="12" font-weight="700" fill="#1A3A52">ReLU gate-count</text>
  <text x="940" y="438" font-family="Verdana, Geneva, sans-serif" font-size="11" fill="#5A6772">tropical / PL</text>
  <rect x="1075" y="425" width="55" height="18" rx="9" fill="#E8F4EC" stroke="#2E7D5A" stroke-width="1"/>

  <line x1="675" y1="475" x2="1135" y2="475" stroke="#CFD8DC" stroke-width="1"/>
  <text x="905" y="490" font-family="Verdana, Geneva, sans-serif" font-size="9" font-weight="800" letter-spacing="1.5" fill="#5A2A22" text-anchor="middle">FIND-SIDE IMPORTED IN EVERY INSTANCE</text>
  <g transform="translate(770,498)" filter="url(#cardShadow)">
    <rect x="0" y="0" width="270" height="18" rx="9" fill="#FFFFFF" stroke="#1A3A52" stroke-width="1.4"/>
    <text x="135" y="13" font-family="Verdana, Geneva, sans-serif" font-size="9" font-weight="800" letter-spacing="1.4" fill="#1A3A52" text-anchor="middle">AXIOM-CLEAN &#183; AxiomAudit-GATED</text>
  </g>

  <!-- Bottom-right mark -->
  <text x="1140" y="600" font-family="Verdana, Geneva, sans-serif" font-size="14" font-weight="700" letter-spacing="2" fill="#9AA4AC" text-anchor="end">sundog.cc</text>

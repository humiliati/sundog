  <text x="685" y="230" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="12" font-weight="700" fill="#1A3A52">max-flow / min-cut</text>
  <text x="940" y="230" font-family="Verdana, Geneva, sans-serif" font-size="11" fill="#5A6772">combinatorial</text>
  <rect x="1075" y="217" width="55" height="18" rx="9" fill="#E8F4EC" stroke="#2E7D5A" stroke-width="1"/>
  <text x="1102" y="229" font-family="Verdana, Geneva, sans-serif" font-size="10" font-weight="800" fill="#2E7D5A" text-anchor="middle">cheap</text>
  <text x="685" y="262" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="12" font-weight="700" fill="#1A3A52">Konig matching / cover</text>
  <text x="940" y="262" font-family="Verdana, Geneva, sans-serif" font-size="11" fill="#5A6772">combinatorial</text>
  <rect x="1075" y="249" width="55" height="18" rx="9" fill="#E8F4EC" stroke="#2E7D5A" stroke-width="1"/>
  <text x="1102" y="261" font-family="Verdana, Geneva, sans-serif" font-size="10" font-weight="800" fill="#2E7D5A" text-anchor="middle">cheap</text>
  <text x="685" y="294" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="12" font-weight="700" fill="#1A3A52">2-SAT decision</text>
  <text x="940" y="294" font-family="Verdana, Geneva, sans-serif" font-size="11" fill="#5A6772">decision</text>
  <rect x="1075" y="281" width="55" height="18" rx="9" fill="#E8F4EC" stroke="#2E7D5A" stroke-width="1"/>
  <text x="1102" y="293" font-family="Verdana, Geneva, sans-serif" font-size="10" font-weight="800" fill="#2E7D5A" text-anchor="middle">cheap</text>
  <text x="685" y="326" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="12" font-weight="700" fill="#1A3A52">Pratt primality</text>
  <text x="940" y="326" font-family="Verdana, Geneva, sans-serif" font-size="11" fill="#5A6772">number theory</text>
  <rect x="1075" y="313" width="55" height="18" rx="9" fill="#E8F4EC" stroke="#2E7D5A" stroke-width="1"/>
  <text x="1102" y="325" font-family="Verdana, Geneva, sans-serif" font-size="10" font-weight="800" fill="#2E7D5A" text-anchor="middle">cheap</text>
  <text x="685" y="358" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="12" font-weight="700" fill="#1A3A52">shortest-path</text>
  <text x="940" y="358" font-family="Verdana, Geneva, sans-serif" font-size="11" fill="#5A6772">combinatorial</text>
  <rect x="1075" y="345" width="55" height="18" rx="9" fill="#E8F4EC" stroke="#2E7D5A" stroke-width="1"/>
  <text x="1102" y="357" font-family="Verdana, Geneva, sans-serif" font-size="10" font-weight="800" fill="#2E7D5A" text-anchor="middle">cheap</text>
  <text x="685" y="390" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="12" font-weight="700" fill="#1A3A52">syndrome verifier</text>
  <text x="940" y="390" font-family="Verdana, Geneva, sans-serif" font-size="11" fill="#5A6772">finite-field</text>
  <rect x="1075" y="377" width="55" height="18" rx="9" fill="#E8F4EC" stroke="#2E7D5A" stroke-width="1"/>
  <text x="1102" y="389" font-family="Verdana, Geneva, sans-serif" font-size="10" font-weight="800" fill="#2E7D5A" text-anchor="middle">cheap</text>
  <text x="685" y="422" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="12" font-weight="700" fill="#1A3A52">ReLU gate-count</text>
  <text x="940" y="422" font-family="Verdana, Geneva, sans-serif" font-size="11" fill="#5A6772">tropical / PL</text>
  <rect x="1075" y="409" width="55" height="18" rx="9" fill="#E8F4EC" stroke="#2E7D5A" stroke-width="1"/>
  <text x="1102" y="421" font-family="Verdana, Geneva, sans-serif" font-size="10" font-weight="800" fill="#2E7D5A" text-anchor="middle">cheap</text>
  <line x1="675" y1="458" x2="1135" y2="458" stroke="#CFD8DC" stroke-width="1"/>
  <text x="905" y="478" font-family="Verdana, Geneva, sans-serif" font-size="10" font-weight="800" letter-spacing="1.5" fill="#5A2A22" text-anchor="middle">FIND-SIDE IMPORTED IN EVERY INSTANCE</text>
  <g transform="translate(770,488)" filter="url(#cardShadow)">
    <rect x="0" y="0" width="270" height="22" rx="11" fill="#FFFFFF" stroke="#1A3A52" stroke-width="1.4"/>
    <text x="135" y="15" font-family="Verdana, Geneva, sans-serif" font-size="10" font-weight="800" letter-spacing="1.4" fill="#1A3A52" text-anchor="middle">AXIOM-CLEAN &#183; AxiomAudit-GATED</text>
  </g>

  <!-- Bottom-right mark -->
  <text x="1140" y="600" font-family="Verdana, Geneva, sans-serif" font-size="14" font-weight="700" letter-spacing="2" fill="#9AA4AC" text-anchor="end">sundog.cc</text>
</svg>

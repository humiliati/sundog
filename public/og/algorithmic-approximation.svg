<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.72"/>
      <stop offset="100%" stop-color="#FFFAF0" stop-opacity="0.94"/>
    </linearGradient>
    <pattern id="ruled" x="0" y="0" width="1200" height="28" patternUnits="userSpaceOnUse">
      <line x1="0" y1="27" x2="1200" y2="27" stroke="#63A3DC" stroke-opacity="0.075" stroke-width="1"/>
    </pattern>
    <radialGradient id="halo" cx="0.18" cy="0.12" r="0.6">
      <stop offset="0%" stop-color="#F4C430" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#F4C430" stop-opacity="0"/>
    </radialGradient>
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="125%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="4"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.15"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Paper-ruled base: warm cream + horizontal blue rules + red legal-pad margin -->
  <rect width="1200" height="630" fill="#FEFDFB"/>
  <rect width="1200" height="630" fill="url(#paper)"/>
  <rect width="1200" height="630" fill="url(#ruled)"/>
  <rect x="90" y="0" width="2" height="630" fill="#FF6363" fill-opacity="0.12"/>
  <rect width="1200" height="630" fill="url(#halo)"/>

  <!-- Top accent rule -->
  <rect x="60" y="60" width="80" height="3" fill="#C99517"/>

  <!-- Eyebrow -->
  <text x="60" y="100" font-family="Verdana, Geneva, sans-serif" font-size="20" font-weight="700" fill="#2A5570" letter-spacing="3">SUNDOG · ALGORITHMIC APPROXIMATION</text>

  <!-- Headline -->
  <text x="60" y="180" font-family="Georgia, 'Times New Roman', serif" font-size="48" font-weight="700" fill="#1A3A52">Universal</text>
  <text x="60" y="230" font-family="Georgia, 'Times New Roman', serif" font-size="48" font-weight="700" fill="#1A3A52">approximation,</text>
  <text x="60" y="281" font-family="Georgia, 'Times New Roman', serif" font-size="48" font-weight="700" fill="#1A3A52">made constructive.</text>

  <!-- Lede -->
  <text x="60" y="380" font-family="Verdana, Geneva, sans-serif" font-size="22" font-weight="400" fill="#40505C">Continuous f on [0,1]</text>
  <text x="60" y="412" font-family="Verdana, Geneva, sans-serif" font-size="22" font-weight="400" fill="#40505C">to explicit ReLU net.</text>
  <text x="60" y="444" font-family="Verdana, Geneva, sans-serif" font-size="22" font-weight="400" fill="#40505C">Axiom-clean. Density imported.</text>

  <!-- URL -->
  <text x="60" y="560" font-family="Courier New, Courier, monospace" font-size="22" font-weight="700" fill="#1A3A52">sundog.cc/algorithmic-approximation</text>

  <!-- Per-page visualization (right side, ~620 to ~1140) -->
  <g filter="url(#cardShadow)">
    <rect x="660" y="130" width="490" height="44" rx="10" fill="#E8F4EC" stroke="#2E7D5A" stroke-width="2"/>
  </g>
  <text x="905" y="151" font-family="Verdana, Geneva, sans-serif" font-size="11" font-weight="800" letter-spacing="2" fill="#214B36" text-anchor="middle">CAPSTONE &#183; UNIVERSAL APPROXIMATION (CONSTRUCTIVE)</text>
  <text x="905" y="167" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="11" font-weight="700" fill="#214B36" text-anchor="middle">continuous f on [0,1] -> explicit ReLU net (eps-uniform)</text>
  <g filter="url(#cardShadow)">
    <rect x="660" y="185" width="490" height="335" rx="12" fill="#FFFFFF" stroke="#B8831E" stroke-width="2"/>
  </g>
  <rect x="660" y="185" width="490" height="36" rx="12" fill="#FDF6E3" stroke="#B8831E" stroke-width="1.6"/>

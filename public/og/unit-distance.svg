<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.72"/><stop offset="100%" stop-color="#FFFAF0" stop-opacity="0.94"/></linearGradient>
    <pattern id="ruled" x="0" y="0" width="1200" height="28" patternUnits="userSpaceOnUse"><line x1="0" y1="27" x2="1200" y2="27" stroke="#63A3DC" stroke-opacity="0.075" stroke-width="1"/></pattern>
    <radialGradient id="halo" cx="0.18" cy="0.12" r="0.6"><stop offset="0%" stop-color="#F4C430" stop-opacity="0.10"/><stop offset="100%" stop-color="#F4C430" stop-opacity="0"/></radialGradient>
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="125%"><feGaussianBlur in="SourceAlpha" stdDeviation="6"/><feOffset dx="0" dy="4"/><feComponentTransfer><feFuncA type="linear" slope="0.15"/></feComponentTransfer><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="1200" height="630" fill="#FEFDFB"/>
  <rect width="1200" height="630" fill="url(#paper)"/>
  <rect width="1200" height="630" fill="url(#ruled)"/>
  <rect x="90" y="0" width="2" height="630" fill="#FF6363" fill-opacity="0.12"/>
  <rect width="1200" height="630" fill="url(#halo)"/>
  <rect x="60" y="60" width="80" height="3" fill="#C99517"/>
  <text x="60" y="100" font-family="Verdana, Geneva, sans-serif" font-size="20" font-weight="700" fill="#2A5570" letter-spacing="3">SUNDOG · UNIT-DISTANCE OVERLAY</text>
  <text x="60" y="200" font-family="Georgia, 'Times New Roman', serif" font-size="56" font-weight="700" fill="#1A3A52">Reading OpenAI's</text>
  <text x="60" y="259" font-family="Georgia, 'Times New Roman', serif" font-size="56" font-weight="700" fill="#1A3A52">2026 disproof.</text>
  <text x="60" y="366" font-family="Verdana, Geneva, sans-serif" font-size="22" font-weight="400" fill="#40505C">From a cyclic cubic field, through an</text>
  <text x="60" y="398" font-family="Verdana, Geneva, sans-serif" font-size="22" font-weight="400" fill="#40505C">unramified pro-3 tower, to a CM lattice</text>
  <text x="60" y="430" font-family="Verdana, Geneva, sans-serif" font-size="22" font-weight="400" fill="#40505C">projecting many unit-distance pairs.</text>
  <text x="60" y="560" font-family="Courier New, Courier, monospace" font-size="22" font-weight="700" fill="#1A3A52">sundog.cc/unit-distance</text>
  
  <g transform="translate(770, 120)">
    <text x="180" y="-12" font-family="Verdana, sans-serif" font-size="11" font-weight="700" letter-spacing="2" fill="#6A7680" text-anchor="middle">SUBSTRATE FLOW</text>

    <!-- Tile 1: cyclic cubic field (yellow sticky) -->
    <g transform="rotate(-2, 180, 60)">
      <rect x="40" y="10" width="280" height="100" rx="3" fill="#FEF9C3" stroke="#C99517" stroke-width="1.2" filter="url(#cardShadow)"/>
      <text x="180" y="36" font-family="Verdana, sans-serif" font-size="11" font-weight="700" fill="#6A7680" text-anchor="middle">CYCLIC CUBIC FIELD</text>
      <text x="180" y="68" font-family="Georgia, serif" font-size="22" font-weight="700" fill="#1A3A52" text-anchor="middle" font-style="italic">number-theoretic seed</text>
      <text x="180" y="92" font-family="Verdana, sans-serif" font-size="11" fill="#684811" text-anchor="middle" font-style="italic">starting algebraic ground</text>
    </g>

    <!-- Arrow down -->
    <g transform="translate(170, 120)">
      <line x1="10" y1="0" x2="10" y2="20" stroke="#1A3A52" stroke-width="2" marker-end="url(#arrowdown)"/>
    </g>

    <!-- Tile 2: pro-3 tower (blue sticky) -->
    <g transform="rotate(1.5, 180, 195)">
      <rect x="40" y="145" width="280" height="100" rx="3" fill="#DBEAFE" stroke="#2A5570" stroke-width="1.2" filter="url(#cardShadow)"/>
      <text x="180" y="171" font-family="Verdana, sans-serif" font-size="11" font-weight="700" fill="#6A7680" text-anchor="middle">UNRAMIFIED PRO-3 TOWER</text>
      <text x="180" y="203" font-family="Georgia, serif" font-size="22" font-weight="700" fill="#1A3A52" text-anchor="middle" font-style="italic">Golod-Shafarevich</text>
      <text x="180" y="227" font-family="Verdana, sans-serif" font-size="11" fill="#1A3A52" text-anchor="middle" font-style="italic">infinite class-field stack</text>
    </g>

    <!-- Arrow down -->
    <g transform="translate(170, 255)">
      <line x1="10" y1="0" x2="10" y2="20" stroke="#1A3A52" stroke-width="2" marker-end="url(#arrowdown)"/>
    </g>

    <!-- Tile 3: CM lattice (pink sticky) -->
    <g transform="rotate(-1, 180, 330)">
      <rect x="40" y="280" width="280" height="100" rx="3" fill="#FCE7F3" stroke="#9C2D7A" stroke-width="1.2" filter="url(#cardShadow)"/>
      <text x="180" y="306" font-family="Verdana, sans-serif" font-size="11" font-weight="700" fill="#6A7680" text-anchor="middle">CM LATTICE -&gt; R&#178;</text>
      <text x="180" y="338" font-family="Georgia, serif" font-size="22" font-weight="700" fill="#1A3A52" text-anchor="middle" font-style="italic">n^1.014 pairs</text>
      <text x="180" y="362" font-family="Verdana, sans-serif" font-size="11" fill="#9C2D7A" text-anchor="middle" font-style="italic">unit-distance lower bound</text>
    </g>

    <text x="180" y="410" font-family="Verdana, sans-serif" font-size="11" fill="#9AA4AC" text-anchor="middle" font-style="italic">after OpenAI 2026 - Sawin delta >= 0.014</text>
  </g>
  <defs>
    <marker id="arrowdown" viewBox="0 0 10 10" refX="5" refY="9" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0,0 L 10,0 L 5,10 z" fill="#1A3A52"/>
    </marker>
  </defs>

  <text x="1140" y="600" font-family="Verdana, Geneva, sans-serif" font-size="14" font-weight="700" letter-spacing="2" fill="#9AA4AC" text-anchor="end">sundog.cc</text>
</svg>

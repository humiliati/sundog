<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FDFDFC"/>
      <stop offset="100%" stop-color="#F5F4EE"/>
    </linearGradient>
    <radialGradient id="halo" cx="0.18" cy="0.12" r="0.6">
      <stop offset="0%" stop-color="#F4C430" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#F4C430" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#halo)"/>

  <!-- Top accent rule -->
  <rect x="60" y="60" width="80" height="3" fill="#C99517"/>

  <!-- Eyebrow -->
  <text x="60" y="100" font-family="Verdana, Geneva, sans-serif" font-size="20" font-weight="700" fill="#2A5570" letter-spacing="3">SUNDOG · STRUCTURAL FAILURE</text>

  <!-- Headline -->
  <text x="60" y="200" font-family="Georgia, 'Times New Roman', serif" font-size="56" font-weight="700" fill="#1A3A52">The falsifier</text>
  <text x="60" y="259" font-family="Georgia, 'Times New Roman', serif" font-size="56" font-weight="700" fill="#1A3A52">before the agent.</text>

  <!-- Lede -->
  <text x="60" y="366" font-family="Verdana, Geneva, sans-serif" font-size="22" font-weight="400" fill="#40505C">A pre-registered five-locus</text>
  <text x="60" y="398" font-family="Verdana, Geneva, sans-serif" font-size="22" font-weight="400" fill="#40505C">boundary map. Closed-form Cut 2</text>
  <text x="60" y="430" font-family="Verdana, Geneva, sans-serif" font-size="22" font-weight="400" fill="#40505C">separability held; Cut 3 still open.</text>

  <!-- URL -->
  <text x="60" y="560" font-family="Courier New, Courier, monospace" font-size="22" font-weight="700" fill="#1A3A52">sundog.cc/structural-failure</text>

  <!-- Per-page visualization (right side, ~620 to ~1140) -->
  
  <g transform="translate(940,310)">
    <text x="0" y="-200" font-family="Verdana, Geneva, sans-serif" font-size="13" font-weight="700" letter-spacing="2" fill="#6A7680" text-anchor="middle">FIVE-LOCUS BOUNDARY MAP</text>
    <!-- Connecting lines -->
    <line x1="-110" y1="-100" x2="110" y2="-100" stroke="#9AA4AC" stroke-width="1" stroke-dasharray="3 3"/>
    <line x1="-110" y1="100"  x2="110" y2="100"  stroke="#9AA4AC" stroke-width="1" stroke-dasharray="3 3"/>
    <line x1="-110" y1="-100" x2="0" y2="0" stroke="#9AA4AC" stroke-width="1" stroke-dasharray="3 3"/>
    <line x1="110"  y1="-100" x2="0" y2="0" stroke="#9AA4AC" stroke-width="1" stroke-dasharray="3 3"/>
    <line x1="-110" y1="100"  x2="0" y2="0" stroke="#9AA4AC" stroke-width="1" stroke-dasharray="3 3"/>
    <line x1="110"  y1="100"  x2="0" y2="0" stroke="#9AA4AC" stroke-width="1" stroke-dasharray="3 3"/>
    <!-- Center node, wider rectangle so the label fits -->
    <rect x="-50" y="-18" width="100" height="36" rx="18" fill="#1A3A52" stroke="#0A1F2E" stroke-width="2"/>
    <text x="0" y="6" font-family="Verdana, Geneva, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">apparatus</text>
    <!-- Four corner loci -->
    <circle cx="-110" cy="-100" r="24" fill="#F4C430" stroke="#C99517" stroke-width="2"/>
    <text x="-110" y="-96" font-family="Verdana, Geneva, sans-serif" font-size="12" font-weight="700" fill="#1A3A52" text-anchor="middle">P0</text>
    <text x="-110" y="-72" font-family="Verdana, Geneva, sans-serif" font-size="10" fill="#6A7680" text-anchor="middle">passed</text>
    <circle cx="110" cy="-100" r="24" fill="#F4C430" stroke="#C99517" stroke-width="2"/>
    <text x="110" y="-96" font-family="Verdana, Geneva, sans-serif" font-size="12" font-weight="700" fill="#1A3A52" text-anchor="middle">P1</text>
    <text x="110" y="-72" font-family="Verdana, Geneva, sans-serif" font-size="10" fill="#6A7680" text-anchor="middle">passed</text>
    <circle cx="-110" cy="100" r="24" fill="#2A5570" stroke="#1A3A52" stroke-width="2"/>
    <text x="-110" y="104" font-family="Verdana, Geneva, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle">Cut 2</text>
    <text x="-110" y="132" font-family="Verdana, Geneva, sans-serif" font-size="10" fill="#6A7680" text-anchor="middle">separability</text>
    <circle cx="110" cy="100" r="24" fill="#FFFFFF" stroke="#9AA4AC" stroke-width="2"/>
    <text x="110" y="104" font-family="Verdana, Geneva, sans-serif" font-size="11" font-weight="700" fill="#1A3A52" text-anchor="middle">Cut 3</text>
    <text x="110" y="132" font-family="Verdana, Geneva, sans-serif" font-size="10" fill="#6A7680" text-anchor="middle">held</text>
  </g>


  <!-- Bottom-right mark -->
  <text x="1140" y="600" font-family="Verdana, Geneva, sans-serif" font-size="14" font-weight="700" letter-spacing="2" fill="#9AA4AC" text-anchor="end">sundog.cc</text>
</svg>

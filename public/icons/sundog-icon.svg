  <path d="M244 642c120 116 416 116 536 0" fill="none" stroke="#7da2b8" stroke-width="24" stroke-linecap="round" opacity="0.42"/>
  <circle cx="512" cy="512" r="112" fill="url(#sun)" filter="url(#glow)"/>
  <circle cx="512" cy="512" r="42" fill="#fff4b2" opacity="0.85"/>
  <path d="M228 512l70-34 70 34-70 34z" fill="#f4c430" opacity="0.92"/>
  <path d="M656 512l70-34 70 34-70 34z" fill="#f4c430" opacity="0.92"/>
  <path d="M512 260l26 74h-52z" fill="#fff4b2" opacity="0.72"/>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">Sundog app icon</title>
  <desc id="desc">Sundog halo mark with central sun, parhelion glints, and alignment arcs.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="72%">
      <stop offset="0%" stop-color="#2c5f7f"/>
      <stop offset="58%" stop-color="#1a3a52"/>
      <stop offset="100%" stop-color="#102436"/>
    </radialGradient>
    <radialGradient id="sun" cx="42%" cy="34%" r="68%">
      <stop offset="0%" stop-color="#fff4b2"/>
      <stop offset="42%" stop-color="#f4c430"/>
      <stop offset="100%" stop-color="#b97812"/>
    </radialGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 0.96  0 1 0 0 0.77  0 0 1 0 0.19  0 0 0 0.68 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1024" height="1024" rx="220" fill="url(#bg)"/>
  <circle cx="512" cy="512" r="346" fill="none" stroke="#7da2b8" stroke-width="26" opacity="0.52"/>

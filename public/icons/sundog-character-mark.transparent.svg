<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">Transparent Sundog character mark</title>
  <desc id="desc">A characterized Sundog halo mark generated from the Phase 10 Halo Atlas shape language.</desc>

  <defs>
    <radialGradient id="sky" cx="50%" cy="42%" r="72%">
      <stop offset="0%" stop-color="#2c5f7f"/>
      <stop offset="58%" stop-color="#1a3a52"/>
      <stop offset="100%" stop-color="#102436"/>
    </radialGradient>
    <radialGradient id="sun" cx="42%" cy="34%" r="68%">
      <stop offset="0%" stop-color="#fff4b2"/>
      <stop offset="42%" stop-color="#f4c430"/>
      <stop offset="100%" stop-color="#b97812"/>
    </radialGradient>
    <linearGradient id="parhelion-left-gradient" x1="0%" x2="100%">
      <stop offset="0%" stop-color="#79bde8"/>
      <stop offset="52%" stop-color="#f4c430"/>
      <stop offset="100%" stop-color="#ff7a45"/>
    </linearGradient>
    <linearGradient id="parhelion-right-gradient" x1="0%" x2="100%">
      <stop offset="0%" stop-color="#ff7a45"/>
      <stop offset="48%" stop-color="#f4c430"/>
      <stop offset="100%" stop-color="#79bde8"/>
    </linearGradient>
    <filter id="soft-glow" x="-45%" y="-45%" width="190%" height="190%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 0.96  0 1 0 0 0.77  0 0 1 0 0.19  0 0 0 0.68 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g data-layer="field.halo-46">
    <circle cx="512" cy="512" r="346" fill="none" stroke="#7da2b8" stroke-width="26" opacity="0.46"/>
  </g>
  <g data-layer="core.halo-22">
    <circle cx="512" cy="512" r="258" fill="none" stroke="#f4c430" stroke-width="18" opacity="0.66"/>
  </g>
  <g data-layer="core.parhelic-belt">
    <path class="parhelic-belt" d="M 166 512 C 340 494 684 494 858 512" fill="none" stroke="#f4c430" stroke-width="25" stroke-linecap="round" opacity="0.7"/>
  </g>
  <g data-layer="core.upper-tangent">
    <path class="upper-eyelid" d="M 276 392 C 356 292 668 292 748 392" fill="none" stroke="#fff4b2" stroke-width="28" stroke-linecap="round" opacity="0.82"/>
  </g>
  <g data-layer="optional.circumzenithal-arc">
    <path d="M 328 276 C 420 232 604 232 696 276" fill="none" stroke="#7da2b8" stroke-width="18" stroke-linecap="round" opacity="0.44"/>
  </g>
  <g data-layer="core.sun" class="sun-body">
    <circle cx="512" cy="512" r="132" fill="#f4c430" opacity="0.15"/>
    <circle cx="512" cy="512" r="112" fill="url(#sun)" filter="url(#soft-glow)"/>
    <circle cx="512" cy="512" r="42" fill="#fff4b2" opacity="0.86"/>
  </g>
  <g data-layer="core.parhelia">
    <path class="parhelion-left" d="M 150.7 512 L 240.7 469 L 330.7 512 L 240.7 555 Z" fill="url(#parhelion-left-gradient)" opacity="0.94"/>
    <path class="parhelion-right" d="M 693.3 512 L 783.3 469 L 873.3 512 L 783.3 555 Z" fill="url(#parhelion-right-gradient)" opacity="0.94"/>
  </g>
</svg>

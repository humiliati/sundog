  </g>
      <text x="66" y="367" fill="#173348" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="800" letter-spacing="0"><tspan x="66" dy="0">Parhelion offset route</tspan></text>
      <text x="66" y="393" fill="#6B7B88" font-family="ui-monospace, SFMono-Regular, Consolas, 'Liberation Mono', monospace" font-size="13" font-weight="400" letter-spacing="0"><tspan x="66" dy="0">offset = R22 / cos(h)</tspan></text>
      <text x="320" y="330" fill="#40505C" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="400" letter-spacing="0"><tspan x="320" dy="0">Strict eligible photo set p2, p7,</tspan><tspan x="320" dy="18">p13; Cut-2 leverage fill uses</tspan><tspan x="320" dy="18">sec(h)-1 &gt;= 0.02, h about 11.37</tspan><tspan x="320" dy="18">deg, as the low-leverage</tspan><tspan x="320" dy="18">transition.</tspan></text>
      <text x="608" y="330" fill="#40505C" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="400" letter-spacing="0"><tspan x="608" dy="0">Low-h low leverage, parhelion-derived-R22</tspan><tspan x="608" dy="18">tautology, and p26 invalid rows must be</tspan><tspan x="608" dy="18">reported as low leverage or ineligible, not</tspan><tspan x="608" dy="18">independent inverse evidence.</tspan></text>
      <text x="956" y="330" fill="#40505C" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="400" letter-spacing="0"><tspan x="956" dy="0">Smooth confident altitude estimates</tspan><tspan x="956" dy="18">continue across low-leverage,</tspan><tspan x="956" dy="18">tautological, or invalid rows.</tspan></text>
    </g>

      <text x="66" y="849" fill="#6B7B88" font-family="ui-monospace, SFMono-Regular, Consolas, 'Liberation Mono', monospace" font-size="13" font-weight="400" letter-spacing="0"><tspan x="66" dy="0">supralateral</tspan><tspan x="66" dy="17">angular-position candidate</tspan></text>
      <text x="320" y="786" fill="#40505C" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="400" letter-spacing="0"><tspan x="320" dy="0">None under the documented</tspan><tspan x="320" dy="18">apparatus.</tspan></text>
      <text x="608" y="786" fill="#40505C" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="400" letter-spacing="0"><tspan x="608" dy="0">All altitudes: the handle fails the</tspan><tspan x="608" dy="18">structural-discrimination gate, with only</tspan><tspan x="608" dy="18">about 0.5 deg spread over h = 0-22 deg.</tspan></text>
      <text x="956" y="786" fill="#40505C" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="400" letter-spacing="0"><tspan x="956" dy="0">Brightness, crop position, or</tspan><tspan x="956" dy="18">co-occurring arcs are treated as if</tspan><tspan x="956" dy="18">they were a usable altitude channel.</tspan></text>

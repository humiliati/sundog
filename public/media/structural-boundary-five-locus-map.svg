  </g>
      <text x="66" y="679" fill="#173348" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="800" letter-spacing="0"><tspan x="66" dy="0">Tangent arc merge</tspan></text>
      <text x="66" y="705" fill="#6B7B88" font-family="ui-monospace, SFMono-Regular, Consolas, 'Liberation Mono', monospace" font-size="13" font-weight="400" letter-spacing="0"><tspan x="66" dy="0">upper-tangent locus route</tspan></text>
      <text x="320" y="642" fill="#40505C" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="400" letter-spacing="0"><tspan x="320" dy="0">h &lt; 29 deg, where the separate</tspan><tspan x="320" dy="18">upper-tangent handle exists.</tspan></text>
      <text x="608" y="642" fill="#40505C" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="400" letter-spacing="0"><tspan x="608" dy="0">At h &gt;= 29 deg tangentArcLocus returns null</tspan><tspan x="608" dy="18">because the tangent arcs have merged into</tspan><tspan x="608" dy="18">the circumscribed-halo regime.</tspan></text>
      <text x="956" y="642" fill="#40505C" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="400" letter-spacing="0"><tspan x="956" dy="0">A tangent-like estimate remains</tspan><tspan x="956" dy="18">continuous through the singularity.</tspan></text>

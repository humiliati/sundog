      <text x="66" y="993" fill="#6B7B88" font-family="ui-monospace, SFMono-Regular, Consolas, 'Liberation Mono', monospace" font-size="13" font-weight="400" letter-spacing="0"><tspan x="66" dy="0">evidence-admissibility</tspan><tspan x="66" dy="17">boundary</tspan></text>
      <text x="320" y="930" fill="#40505C" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="400" letter-spacing="0"><tspan x="320" dy="0">Only anchored closed-form rows with</tspan><tspan x="320" dy="18">project receipts may count as</tspan><tspan x="320" dy="18">inverse evidence.</tspan></text>
      <text x="608" y="930" fill="#40505C" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="400" letter-spacing="0"><tspan x="608" dy="0">Rendered-optional, named-only, not-modeled,</tspan><tspan x="608" dy="18">and atlas-placeholder primitives cannot</tspan><tspan x="608" dy="18">carry traceability evidence by themselves.</tspan></text>
      <text x="956" y="930" fill="#40505C" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="400" letter-spacing="0"><tspan x="956" dy="0">The mere presence of a drawn or named</tspan><tspan x="956" dy="18">primitive is treated as evidence that</tspan><tspan x="956" dy="18">an inverse is available.</tspan></text>

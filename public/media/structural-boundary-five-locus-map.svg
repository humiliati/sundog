      <text x="320" y="498" fill="#40505C" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="400" letter-spacing="0"><tspan x="320" dy="0">Sun altitude h &lt;= 32 deg, the coded</tspan><tspan x="320" dy="18">operative guard.</tspan></text>
      <text x="608" y="498" fill="#40505C" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="400" letter-spacing="0"><tspan x="608" dy="0">Above 32 deg a CZA-dependent route must</tspan><tspan x="608" dy="18">fail, abstain, or switch handles.</tspan></text>
      <text x="956" y="498" fill="#40505C" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="400" letter-spacing="0"><tspan x="956" dy="0">Altitude estimates continue through</tspan><tspan x="956" dy="18">the cutoff because other image</tspan><tspan x="956" dy="18">features still correlate with h.</tspan></text>

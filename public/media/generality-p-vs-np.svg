    <text x="72" y="92" fill="#C9972F" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="850" letter-spacing="0.08em">MATH-LEDGER</text>
    <text x="72" y="132" fill="#173348" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="32" font-weight="850" text-anchor="start" letter-spacing="0"><tspan x="72" dy="0">Bounded alignment-verification</tspan><tspan x="72" dy="38">verifier chain</tspan></text>
    <text x="72" y="224" fill="#40505C" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="400" text-anchor="start" letter-spacing="0"><tspan x="72" dy="0">The verifier reached bounded-positive at v6 on the frozen op-count gate.</tspan><tspan x="72" dy="23">The mesa transplant was spoofed at small capacity, then closed by 3-of-4</tspan><tspan x="72" dy="23">consensus with a block-unstable quarantine. A Lean core now verifies</tspan><tspan x="72" dy="23">soundness and lossiness; decoding hardness stays imported.</tspan></text>
    <text x="72" y="324" fill="#214B36" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="850" letter-spacing="0.06em">NEXT GATE</text>
    <text x="72" y="350" fill="#40505C" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="400" text-anchor="start" letter-spacing="0"><tspan x="72" dy="0">Implement the frozen Phase 3 v2/v2b disclosure-consensus harness, then score the v1</tspan><tspan x="72" dy="20">regression set and corrected v2b fresh holdout.</tspan></text>
    <g>
        <rect x="72" y="474" width="164" height="86" rx="8" fill="#E7F4EC" stroke="#2F7D4F" stroke-width="1"/>
        <text x="90" y="510" fill="#173348" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="26" font-weight="850" letter-spacing="0">11</text>
        <text x="90" y="534" fill="#214B36" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" font-weight="800" text-anchor="start" letter-spacing="0"><tspan x="90" dy="0">filed receipts</tspan><tspan x="90" dy="14">(incl p3v1)</tspan></text>
      </g><g>
        <rect x="270" y="474" width="164" height="86" rx="8" fill="#E7F4EC" stroke="#2F7D4F" stroke-width="1"/>
        <text x="288" y="510" fill="#173348" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="26" font-weight="850" letter-spacing="0">0</text>
        <text x="288" y="534" fill="#214B36" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" font-weight="800" text-anchor="start" letter-spacing="0"><tspan x="288" dy="0">v6 false accepts</tspan><tspan x="288" dy="14">(items)</tspan></text>

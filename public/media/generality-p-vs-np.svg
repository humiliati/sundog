<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 660" width="900" height="660" role="img" aria-labelledby="title desc">
  <title id="title">P-vs-NP generality card</title>
  <desc id="desc">Generated Sundog generality chart.</desc>
  <rect width="900" height="660" fill="#F8FBFC"/>
  
    <rect x="40" y="40" width="820" height="580" rx="8" fill="#FFFFFF" stroke="#DCE6EC" stroke-width="1"/>
    <rect x="40" y="40" width="10" height="580" rx="5" fill="#A85043"/>
    <g>
    <rect x="686" y="70" width="154" height="30" rx="8" fill="#F8E7E3" stroke="#A85043" stroke-width="1"/>
    <text x="700" y="90" fill="#6B3029" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="800" letter-spacing="0">COST HOLD</text>
  </g>
    <text x="72" y="92" fill="#C9972F" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="850" letter-spacing="0.08em">MATH-LEDGER</text>
    <text x="72" y="132" fill="#173348" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="32" font-weight="850" text-anchor="start" letter-spacing="0"><tspan x="72" dy="0">Bounded alignment-verification</tspan><tspan x="72" dy="38">verifier chain</tspan></text>
    <text x="72" y="224" fill="#40505C" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="400" text-anchor="start" letter-spacing="0"><tspan x="72" dy="0">The v0-v5 chain closed multiple safety holes, but v5 is still</tspan><tspan x="72" dy="23">cost-unadjudicated after environment-hash drift.</tspan></text>
    <text x="72" y="324" fill="#6B3029" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="850" letter-spacing="0.06em">NEXT GATE</text>
    <text x="72" y="350" fill="#40505C" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="400" text-anchor="start" letter-spacing="0"><tspan x="72" dy="0">Rerun v5 twice, compare environment hashes and median cost, then finalize or void</tspan><tspan x="72" dy="20">the provisional receipt.</tspan></text>
    <g>
        <rect x="72" y="474" width="164" height="86" rx="8" fill="#F8E7E3" stroke="#A85043" stroke-width="1"/>
        <text x="90" y="510" fill="#173348" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="26" font-weight="850" letter-spacing="0">6</text>
        <text x="90" y="534" fill="#6B3029" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" font-weight="800" text-anchor="start" letter-spacing="0"><tspan x="90" dy="0">phase receipts</tspan><tspan x="90" dy="14">(v0-v5)</tspan></text>
      </g><g>
        <rect x="270" y="474" width="164" height="86" rx="8" fill="#F8E7E3" stroke="#A85043" stroke-width="1"/>
        <text x="288" y="510" fill="#173348" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="26" font-weight="850" letter-spacing="0">0</text>
        <text x="288" y="534" fill="#6B3029" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" font-weight="800" text-anchor="start" letter-spacing="0"><tspan x="288" dy="0">v5 false accepts</tspan><tspan x="288" dy="14">(items)</tspan></text>
      </g><g>
        <rect x="468" y="474" width="164" height="86" rx="8" fill="#F8E7E3" stroke="#A85043" stroke-width="1"/>
        <text x="486" y="510" fill="#173348" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="26" font-weight="850" letter-spacing="0">2</text>
        <text x="486" y="534" fill="#6B3029" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" font-weight="800" text-anchor="start" letter-spacing="0"><tspan x="486" dy="0">required reruns</tspan><tspan x="486" dy="14">(runs)</tspan></text>
      </g>
  
</svg>

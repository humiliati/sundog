<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Pressure Mines rail poster</title>
  <desc id="desc">A pressure-shaded mines grid with a safe pocket, revealed path, and named failure edge.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07151f"/>
      <stop offset="0.5" stop-color="#133149"/>
      <stop offset="1" stop-color="#0b1720"/>
    </linearGradient>
    <radialGradient id="pressure" cx="0.62" cy="0.45" r="0.58">
      <stop offset="0" stop-color="#f4c430" stop-opacity="0.34"/>
      <stop offset="0.48" stop-color="#b8653b" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#67c9a6" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
